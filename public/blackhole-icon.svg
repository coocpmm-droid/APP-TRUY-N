<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="25%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#9333ea" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="disk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="25%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="75%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="front-clip">
      <!-- Clip path to only show the bottom half of the disk (front) -->
      <rect x="-100" y="256" width="712" height="356" transform="rotate(-20 256 256)"/>
    </clipPath>
  </defs>
  
  <rect width="512" height="512" fill="transparent"/>
  
  <!-- Outer Halo -->
  <circle cx="256" cy="256" r="240" fill="url(#halo)" filter="url(#glow-heavy)"/>
  
  <!-- Accretion Disk (Back) -->
  <ellipse cx="256" cy="256" rx="220" ry="65" fill="none" stroke="url(#disk-grad)" stroke-width="28" filter="url(#glow-heavy)" transform="rotate(-20 256 256)"/>
  
  <!-- Black Hole Event Horizon -->
  <circle cx="256" cy="256" r="90" fill="#000000" stroke="#ffffff" stroke-width="4" filter="url(#glow-light)"/>
  <circle cx="256" cy="256" r="88" fill="#000000"/>
  
  <!-- Accretion Disk (Front) -->
  <g clip-path="url(#front-clip)">
    <ellipse cx="256" cy="256" rx="220" ry="65" fill="none" stroke="url(#disk-grad)" stroke-width="36" filter="url(#glow-heavy)" transform="rotate(-20 256 256)"/>
    <ellipse cx="256" cy="256" rx="220" ry="65" fill="none" stroke="#ffffff" stroke-width="6" filter="url(#glow-light)" transform="rotate(-20 256 256)"/>
  </g>
  
  <!-- Photon Ring -->
  <circle cx="256" cy="256" r="98" fill="none" stroke="#fef08a" stroke-width="3" opacity="0.9" filter="url(#glow-light)"/>
  <circle cx="256" cy="256" r="106" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
</svg>
