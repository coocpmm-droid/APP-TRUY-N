<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Luxury Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FEF08A" />
      <stop offset="75%" stop-color="#CA8A04" />
      <stop offset="100%" stop-color="#A16207" />
    </linearGradient>
    
    <linearGradient id="gold-dark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#854D0E" />
      <stop offset="50%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#713F12" />
    </linearGradient>

    <!-- Leather Cover Gradient -->
    <linearGradient id="leather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F2305" />
      <stop offset="50%" stop-color="#2C1A04" />
      <stop offset="100%" stop-color="#1A0F02" />
    </linearGradient>
    
    <linearGradient id="leather-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5C3A21" />
      <stop offset="50%" stop-color="#3F2305" />
      <stop offset="100%" stop-color="#2C1A04" />
    </linearGradient>

    <!-- Pages Gradient -->
    <linearGradient id="pages" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#FEF3C7" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Drop Shadow for 3D effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff" />
      <feFlood flood-color="#FDE047" flood-opacity="0.5" />
      <feComposite in2="shadowDiff" operator="in" />
      <feComposite in2="SourceGraphic" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="256" cy="256" r="240" fill="url(#gold)" opacity="0.15" filter="blur(20px)" />

  <!-- Book Base / Cover Back -->
  <path d="M 120 100 Q 256 60 392 100 L 420 420 Q 256 380 92 420 Z" fill="url(#leather)" filter="url(#shadow)" />
  
  <!-- Pages -->
  <path d="M 130 110 Q 256 75 382 110 L 405 405 Q 256 370 107 405 Z" fill="url(#pages)" />
  <path d="M 130 115 Q 256 80 382 115 L 405 405 Q 256 370 107 405 Z" fill="#FEF3C7" />
  
  <!-- Page Lines (Details) -->
  <path d="M 135 125 Q 256 90 377 125" stroke="#D97706" stroke-width="2" fill="none" opacity="0.5" />
  <path d="M 135 135 Q 256 100 377 135" stroke="#D97706" stroke-width="2" fill="none" opacity="0.5" />
  <path d="M 135 145 Q 256 110 377 145" stroke="#D97706" stroke-width="2" fill="none" opacity="0.5" />

  <!-- Book Cover Front (Left Side) -->
  <path d="M 100 90 Q 256 50 256 50 L 256 440 Q 256 440 70 410 Z" fill="url(#leather-highlight)" filter="url(#shadow)" />
  
  <!-- Book Cover Front (Right Side) -->
  <path d="M 256 50 Q 256 50 412 90 L 442 410 Q 256 440 256 440 Z" fill="url(#leather)" filter="url(#shadow)" />

  <!-- Spine -->
  <path d="M 240 45 Q 272 45 272 445 Q 240 445 240 45 Z" fill="url(#gold-dark)" filter="url(#shadow)" />
  <path d="M 246 50 L 266 50 L 266 440 L 246 440 Z" fill="url(#leather-highlight)" />

  <!-- Spine Details (Gold Bands) -->
  <rect x="242" y="100" width="28" height="15" fill="url(#gold)" rx="3" />
  <rect x="242" y="200" width="28" height="15" fill="url(#gold)" rx="3" />
  <rect x="242" y="300" width="28" height="15" fill="url(#gold)" rx="3" />
  <rect x="242" y="400" width="28" height="15" fill="url(#gold)" rx="3" />

  <!-- Cover Gold Borders -->
  <!-- Left Border -->
  <path d="M 115 105 Q 240 70 240 70 L 240 415 Q 240 415 90 390 Z" fill="none" stroke="url(#gold)" stroke-width="6" filter="url(#inner-glow)" />
  <path d="M 125 115 Q 230 85 230 85 L 230 400 Q 230 400 105 375 Z" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.7" />
  
  <!-- Right Border -->
  <path d="M 272 70 Q 272 70 397 105 L 422 390 Q 272 415 272 415 Z" fill="none" stroke="url(#gold)" stroke-width="6" filter="url(#inner-glow)" />
  <path d="M 282 85 Q 282 85 387 115 L 407 375 Q 282 400 282 400 Z" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.7" />

  <!-- Intricate Corner Ornaments (Left) -->
  <circle cx="115" cy="105" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  <circle cx="240" cy="70" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  <circle cx="90" cy="390" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  <circle cx="240" cy="415" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  
  <!-- Intricate Corner Ornaments (Right) -->
  <circle cx="272" cy="70" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  <circle cx="397" cy="105" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  <circle cx="272" cy="415" r="12" fill="url(#gold)" filter="url(#inner-glow)" />
  <circle cx="422" cy="390" r="12" fill="url(#gold)" filter="url(#inner-glow)" />

  <!-- Center Emblem (Left Cover) -->
  <g transform="translate(165, 240)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#gold)" stroke-width="4" />
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="5,5" />
    <path d="M 0 -15 L 15 0 L 0 15 L -15 0 Z" fill="url(#gold)" filter="url(#inner-glow)" />
    <circle cx="0" cy="0" r="5" fill="#1A0F02" />
  </g>

  <!-- Center Emblem (Right Cover) -->
  <g transform="translate(347, 240)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#gold)" stroke-width="4" />
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="5,5" />
    <path d="M 0 -15 L 15 0 L 0 15 L -15 0 Z" fill="url(#gold)" filter="url(#inner-glow)" />
    <circle cx="0" cy="0" r="5" fill="#1A0F02" />
  </g>

  <!-- Magical Runes / Text on Cover -->
  <path d="M 150 160 Q 165 155 180 160" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 155 175 Q 165 170 175 175" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" />
  
  <path d="M 332 160 Q 347 155 362 160" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 337 175 Q 347 170 357 175" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" />

  <path d="M 150 320 Q 165 325 180 320" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 155 305 Q 165 310 175 305" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" />
  
  <path d="M 332 320 Q 347 325 362 320" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 337 305 Q 347 310 357 305" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Floating Particles/Magic Dust -->
  <circle cx="100" cy="200" r="3" fill="#FEF08A" filter="blur(1px)" />
  <circle cx="120" cy="150" r="2" fill="#FEF08A" filter="blur(1px)" />
  <circle cx="400" cy="300" r="4" fill="#FEF08A" filter="blur(2px)" />
  <circle cx="420" cy="250" r="2" fill="#FEF08A" filter="blur(1px)" />
  <circle cx="256" cy="30" r="3" fill="#FEF08A" filter="blur(1px)" />
  <circle cx="256" cy="480" r="5" fill="#FEF08A" filter="blur(2px)" />
  <circle cx="80" cy="350" r="2" fill="#FEF08A" filter="blur(1px)" />
  <circle cx="440" cy="150" r="3" fill="#FEF08A" filter="blur(1px)" />
</svg>
