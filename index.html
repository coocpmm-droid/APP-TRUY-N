<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nguyễn Hoàng</title>
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/blackhole-icon.svg?v=blackhole-v1" />
    <link rel="apple-touch-icon" href="/blackhole-icon.svg?v=blackhole-v1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Inter (Sans) & Cormorant Garamond (Serif) & Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Dark Luxury Palette
              ink: {
                950: '#000000', // Pure Black
                900: '#0a0a0a', // Very Dark Gray
                800: '#171717', // Dark Gray
                700: '#262626', // Gray
                600: '#404040', 
                500: '#525252',
                400: '#a3a3a3',
              },
              // Refined Accents
              gold: {
                100: '#fef9c3',
                200: '#fde047',
                300: '#facc15',
                400: '#eab308',
                500: '#d4af37', // Classic Gold
                600: '#ca8a04',
                900: '#713f12',
              },
              parchment: {
                50: '#fafafa',
                100: '#f5f5f5', 
                200: '#e5e5e5', 
                300: '#d4d4d4', 
                400: '#a3a3a3',
                500: '#737373',
              },
              arcane: {
                400: '#c084fc',
                500: '#a855f7',
                600: '#9333ea',
                900: '#581c87',
              },
              spirit: {
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                900: '#0c4a6e',
              },
              jade: {
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
              },
              crimson: {
                400: '#fb7185',
                500: '#f43f5e',
                600: '#e11d48',
              }
            },
            fontFamily: {
              serif: ['Cormorant Garamond', 'serif'],
              display: ['Playfair Display', 'serif'], 
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'slide-up': 'slideUp 0.4s ease-out forwards',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'shimmer': 'shimmer 3s linear infinite',
              'page-enter': 'pageEnter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'orbit': 'orbit 20s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(245, 158, 11, 0.2)' },
                '100%': { boxShadow: '0 0 20px rgba(245, 158, 11, 0.6), 0 0 10px rgba(245, 158, 11, 0.4)' }
              },
              shimmer: {
                '0%': { backgroundPosition: '200% 0' },
                '100%': { backgroundPosition: '-200% 0' }
              },
              pageEnter: {
                '0%': { opacity: '0', transform: 'translateY(15px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' }
              },
              orbit: {
                'from': { transform: 'rotate(0deg) translateX(10px) rotate(0deg)' },
                'to': { transform: 'rotate(360deg) translateX(10px) rotate(-360deg)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        /* Dark Luxury Background */
        background-color: #050505;
        background-image: radial-gradient(circle at 50% 0%, #171717 0%, #050505 70%);
        background-attachment: fixed;
        color: #e5e5e5;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        position: relative;
        overflow-x: hidden;
      }

      /* Subtle Atmospheric Glow */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
      }
      
      p {
        margin-bottom: 1.25em;
        line-height: 1.8;
      }

      /* Custom scrollbar - Elegant */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2); 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1); 
        border-radius: 10px;
        transition: all 0.3s ease;
      }
      *:hover::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.5) !important;
      }

      /* Glassmorphism utilities - Refined */
      .glass {
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      
      .glass-panel {
        background: rgba(15, 15, 15, 0.7);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      }

      .text-glow {
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }
      .text-glow-gold {
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
      }
      .text-glow-crimson {
        text-shadow: 0 0 15px rgba(244, 63, 94, 0.5);
      }
      .text-glow-purple {
        text-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
      }
      
      .prose-content {
        font-size: 1.05rem;
      }
      @media (min-width: 768px) {
        .prose-content {
          font-size: 1.125rem;
        }
      }

      .page-enter-active {
        animation: pageEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
